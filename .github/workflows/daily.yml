name: Daily flight price check

on:
  # 触发源: cron-job.org 每天 11:30 America/Tijuana 通过 GitHub REST API
  # 调用 workflow_dispatch (POST /actions/workflows/daily.yml/dispatches)。
  # 弃用 GitHub 自家 schedule 的原因: 2026-06-18 至 06-19 实测,免费层
  # schedule 触发不可靠 —— 06-18 完全没触发, 06-19 延迟 1h40min。
  workflow_dispatch:

permissions:
  contents: write           # needed to commit price_history.csv back

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run tracker
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main
      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price_history.csv
          git diff --staged --quiet || git commit -m "data: price history $(date -u +%F)"
          git push
